<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ES6 Todo List App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>My ES6 Todo List</h1>

    <div class="input-section">
        <input type="text" id="todo-input" placeholder="Enter a todo">
        <button id="add-todo-btn">Add Todo</button>
    </div>

    <div class="filters">
        <button id="show-all" class="active">All</button>
        <button id="show-active">Active</button>
        <button id="show-completed">Completed</button>
    </div>

    <ul id="todo-list">
        <!-- Todo items will be rendered here -->
    </ul>

    <button id="clear-completed-btn">Clear Completed</button>
</div>

<!-- Link your JavaScript file here. No 'type="module"' as we're consolidating. -->
<script src="script.js" defer></script>
</body>
</html>
