<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="left-section">
            <h2>Weather Overview</h2>
            <p>Explore current weather conditions for various countries.</p>
            <p>Enter a country name in the search box on the right to see its weather details.</p>
        </div>
        <div class="right-section">
            <div class="search-area">
                <label for="countryInput" class="block text-lg font-medium text-gray-700 mb-2">Enter Country Name:</label>
                <input type="text" id="countryInput" placeholder="e.g., USA, India, Japan, UK" class="w-full p-3 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 text-base">
            </div>
            <div class="weather-details mt-6 p-4 bg-gray-50 rounded-lg shadow-inner">
                <h3 class="text-xl font-semibold text-gray-800 mb-4">Weather Details for: <span id="countryNameDisplay" class="text-blue-600"></span></h3>
                <p class="text-gray-600 mb-2">Temperature: <span id="temperature" class="font-medium text-gray-700">N/A</span></p>
                <p class="text-gray-600 mb-2">Condition: <span id="condition" class="font-medium text-gray-700">N/A</span></p>
                <p class="text-gray-600 mb-2">Humidity: <span id="humidity" class="font-medium text-gray-700">N/A</span></p>
                <p class="text-gray-600 mb-2">Wind Speed: <span id="windSpeed" class="font-medium text-gray-700">N/A</span></p>
                <p id="errorMessage" class="error-message text-red-600 mt-4 font-semibold"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
