<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transform Practice</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        
        h1 {
            margin-bottom: 40px;
            color: #333;
        }
        
        .transform-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 30px;
            max-width: 800px;
        }
        
        .transform-item {
            width: 150px;
            height: 150px;
            background-color: #86e8ab;
            color: rgb(18, 2, 2);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            transition: transform 0.3s ease, background-color 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        /* Rotate transform */
        .rotate:hover {
            transform: rotate(45deg);
            background-color: #e11825;
        }
        
        /* Scale transform */
        .scale:hover {
            transform: scale(1.2);
            background-color: #dd0baf;
        }
        
        /* Translate transform */
        .translate:hover {
            transform: translateY(-20px);
            background-color: #0e0ebc;
        }
        
    </style>
</head>
<body>
    <h1>CSS Transform Effects</h1>
    
    <div class="transform-container">
        <div class="transform-item rotate">Rotate</div>
        <div class="transform-item scale">Scale</div>
        <div class="transform-item translate">Translate</div>
    </div>
    
</body>
</html>
