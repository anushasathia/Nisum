<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Grades Table</title>
    <style>
        table {
            width: 60%;
            margin: 2rem auto;
            border-collapse: collapse;
            font-family: Arial, sans-serif;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ccc;
            text-align: center;
        }

        thead {
            background-color: #020e4a;
            color: white;
        }

        tfoot {
            background-color: #f0f0f0;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th>Student Name</th>
                <th>Subject</th>
                <th>Marks</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Anusha Sathia</td>
                <td>Mathematics</td>
                <td>92</td>
            </tr>
            <tr>
                <td>Rohan Mehta</td>
                <td>Physics</td>
                <td>85</td>
            </tr>
            <tr>
                <td>Priya Nair</td>
                <td>Chemistry</td>
                <td>89</td>
            </tr>
            <tr>
                <td>Arjun Verma</td>
                <td>English</td>
                <td>76</td>
            </tr>
            <tr>
                <td>Simran Kaur</td>
                <td>Biology</td>
                <td>94</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2">Average Marks</td>
                <td>87.2</td>
            </tr>
        </tfoot>
    </table>

</body>
</html>
